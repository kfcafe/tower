<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>imp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
    font-size: 16px;
    line-height: 1.0;
    color: #b09050;
    padding: 60px;
    display: flex;
    justify-content: center;
  }
  pre {
    white-space: pre;
    font-family: inherit;
    line-height: 1.2;
  }
  .page { text-align: center; }
  .label {
    margin-top: 24px;
    font-size: 11px;
    color: #5a4428;
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>
<div class="page">
<pre id="imp"></pre>
<div class="label">imp · the worker engine</div>
</div>
<script>
const FRAMES = [
  // Frame 0 — neutral
  [
    "  ┌──┐      ┌──┐        ",
    "  │  └──────┘  │        ",
    "  │              │        ",
    "  │  ╲╱    ╲╱   │        ",
    "  │              │        ",
    "  │              │        ",
    "  │  ╱╲╱╲╱╲╱╲   │        ",
    "  │              │        ",
    "  └──┐      ┌──┘        ",
    " │   │      │   │       ",
    " │   │      │   │       ",
    " │   │      │   │       ",
    "╱╲   │      │  ╱╲       ",
    "      │      │           ",
    "    ┌─┘      └─┐        ",
    "    └──┐    ┌──┘        ",
  ],
  // Frame 1 — bob up
  [
    "                          ",
    "  ┌──┐      ┌──┐        ",
    "  │  └──────┘  │        ",
    "  │              │        ",
    "  │  ╲╱    ╲╱   │        ",
    "  │              │        ",
    "  │              │        ",
    "  │  ╱╲╱╲╱╲╱╲   │        ",
    "  │              │        ",
    "  └──┐      ┌──┘        ",
    " │   │      │   │       ",
    " │   │      │   │       ",
    "╱╲   │      │  ╱╲       ",
    "      │      │           ",
    "    ┌─┘      └─┐        ",
    "    └──┐    ┌──┘        ",
  ],
];

const el = document.getElementById('imp');
const SEQ = [0, 0, 0, 0, 1, 1, 0, 0];
let idx = 0;

function render() {
  el.textContent = FRAMES[SEQ[idx]].join('\n');
}

function tick() {
  idx = (idx + 1) % SEQ.length;
  render();
}

render();
setInterval(tick, 250);
</script>
</body>
</html>
