name: Edge Linux binaries

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.workspace.toml'
      - '.github/workflows/edge.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout mana sibling for path dependency
        uses: actions/checkout@v4
        with:
          repository: kfcafe/mana
          path: mana-src

      - name: Setup workspace
        run: |
          ln -sfn "$GITHUB_WORKSPACE/mana-src" ../mana
          if [ -f Cargo.workspace.toml ] && [ ! -f Cargo.toml ]; then
            cp Cargo.workspace.toml Cargo.toml
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: edge-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p imp-cli

      - name: Package edge archive
        run: |
          ARCHIVE_DIR="imp-edge-${{ matrix.target }}"
          ARCHIVE="${ARCHIVE_DIR}.tar.gz"
          rm -rf "$ARCHIVE_DIR" "$ARCHIVE"
          mkdir "$ARCHIVE_DIR"
          cp "target/${{ matrix.target }}/release/imp" "$ARCHIVE_DIR/"
          tar czf "$ARCHIVE" "$ARCHIVE_DIR"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imp-edge-${{ matrix.target }}
          path: |
            imp-edge-${{ matrix.target }}.tar.gz
            imp-edge-${{ matrix.target }}.tar.gz.sha256

      - name: Upload edge release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view edge >/dev/null 2>&1 || \
            gh release create edge --prerelease --title edge --notes "Rolling edge binaries for Harbor / Linux installs"
          gh release upload edge "imp-edge-${{ matrix.target }}.tar.gz" --clobber
          gh release upload edge "imp-edge-${{ matrix.target }}.tar.gz.sha256" --clobber
