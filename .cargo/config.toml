# Tower workspace Cargo config
# Optimizes build speed for iterative agent-driven development.

[build]
# sccache: shared compilation cache across builds and agents.
# Eliminates redundant recompilation of unchanged dependencies.
# Disabled in committed config — sccache isn't available on CI.
# To enable locally: RUSTC_WRAPPER=sccache cargo build
# Or uncomment below if sccache is always available on your machine.
# rustc-wrapper = "sccache"

# Ensure incremental compilation is always on for dev builds.
incremental = true

# Note: mold linker is Linux-only. On macOS/arm64 the Apple linker
# is already the fastest option. If the project moves to Linux CI,
# add:
#   [target.x86_64-unknown-linux-gnu]
#   linker = "clang"
#   rustflags = ["-C", "link-arg=-fuse-ld=mold"]
